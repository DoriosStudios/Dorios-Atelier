# .github/workflows/discord-release.yml
name: Discord Release Notifier
on:
  release:
    types: [prereleased]

concurrency:
  group: discord-release-${{ github.event.release.id }}
  cancel-in-progress: true

jobs:
  notify:
    if: ${{ github.run_attempt == 1 }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_RELEASE }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail

          # Decide title and color based on prerelease flag
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            color=16753920
            release_kind="Prerelease"
          else
            color=3066993
            release_kind="Release"
          fi

          title="$RELEASE_NAME"
          if [ -z "$title" ]; then
            title="$RELEASE_TAG"
          fi

          # Simulated subtitle + release notes
          subtitle="# $RELEASE_NAME"
          version_line="Version: $RELEASE_TAG"

          raw_body="$RELEASE_BODY"
          if [ -z "$raw_body" ]; then
            raw_body="No release notes were provided."
          fi

          # Keep line breaks (Discord renders real newlines, not literal "\n")
          clean_body="$(printf '%s' "$raw_body" | sed 's/\r//g')"
          full_text="$(printf '%s\n%s\n\n%s' "$subtitle" "$version_line" "$clean_body")"

          # Respect official embed limits:
          # - description: 4096
          # - total textual content across embeds: 6000
          max_total_chars=6000
          max_description_chars=4096

          if [ ${#title} -gt 256 ]; then
            title="${title:0:255}…"
          fi

          footer_text="$release_kind • Dorios' Atelier"
          if [ ${#footer_text} -gt 2048 ]; then
            footer_text="${footer_text:0:2047}…"
          fi

          available_for_notes=$((max_total_chars - ${#title} - ${#footer_text}))
          if [ "$available_for_notes" -lt 0 ]; then
            available_for_notes=0
          fi

          first_chunk_limit=$max_description_chars
          if [ "$first_chunk_limit" -gt "$available_for_notes" ]; then
            first_chunk_limit=$available_for_notes
          fi

          description_part_1="${full_text:0:$first_chunk_limit}"
          consumed_chars=${#description_part_1}
          remaining_budget=$((available_for_notes - consumed_chars))

          remaining_text=""
          if [ ${#full_text} -gt "$consumed_chars" ]; then
            remaining_text="${full_text:$consumed_chars}"
          fi

          second_chunk_limit=$max_description_chars
          if [ "$second_chunk_limit" -gt "$remaining_budget" ]; then
            second_chunk_limit=$remaining_budget
          fi

          description_part_2=""
          if [ "$second_chunk_limit" -gt 0 ] && [ -n "$remaining_text" ]; then
            description_part_2="${remaining_text:0:$second_chunk_limit}"
          fi

          sent_chars=$(( ${#description_part_1} + ${#description_part_2} ))
          if [ ${#full_text} -gt "$sent_chars" ] && [ "$sent_chars" -gt 0 ]; then
            if [ -n "$description_part_2" ] && [ ${#description_part_2} -gt 0 ]; then
              description_part_2="${description_part_2:0:$(( ${#description_part_2} - 1 ))}…"
            elif [ -n "$description_part_1" ] && [ ${#description_part_1} -gt 0 ]; then
              description_part_1="${description_part_1:0:$(( ${#description_part_1} - 1 ))}…"
            fi
          fi

          payload=$(jq -cn \
            --arg t "$title" \
            --arg d1 "$description_part_1" \
            --arg d2 "$description_part_2" \
            --arg u "$RELEASE_URL" \
            --arg ts "$RELEASE_PUBLISHED_AT" \
            --arg ft "$footer_text" \
            --argjson c "$color" \
            '{
              embeds: (
                [{
                  title: $t,
                  description: $d1,
                  url: (if ($u | length) > 0 then $u else null end),
                  color: $c,
                  footer: { text: $ft },
                  timestamp: (if ($ts | length) > 0 then $ts else null end)
                }] +
                (if ($d2 | length) > 0 then [{
                  description: $d2,
                  color: $c
                }] else [] end)
              ),
              components: (
                if ($u | length) > 0 then
                  [{
                    type: 1,
                    components: [{
                      type: 2,
                      style: 5,
                      label: "Download in GitHub",
                      url: $u
                    }]
                  }]
                else
                  []
                end
              ),
              allowed_mentions: { parse: [] }
            } | (.embeds |= map(with_entries(select(.value != null))))')

          webhook_url="$DISCORD_WEBHOOK"
          case "$webhook_url" in
            *\?*) webhook_url="${webhook_url}&with_components=true" ;;
            *)    webhook_url="${webhook_url}?with_components=true" ;;
          esac

          curl -sS --fail-with-body \
            --form-string "payload_json=$payload" \
            "$webhook_url"